apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapi
  namespace: emart
  labels:
    app:  nodeapi
spec:
  selector:
    matchLabels:
      app: nodeapi
  replicas: 1
  template:
    metadata:
      labels:
        app:  nodeapi
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z emongo.emart.svc.cluster.local 27017; do echo waiting for mongodb; sleep 2; done']
      containers:
      - name:  nodeapi
        image:  aravindepic/nodeapi:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: nodeapi
        env:
        - name: MONGO_URI
          value: "mongodb://emongo.emart.svc.cluster.local:27017/epoc"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/shop/info
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/shop/info
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5